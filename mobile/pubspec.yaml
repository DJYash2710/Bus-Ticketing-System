name: bus_ticketing
description: TealTransit — bus booking platform.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.8.0+1
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.4
  freezed_annotation: ^3.0.0
  go_router: ^15.1.2
  json_annotation: ^4.9.0
  intl: ^0.20.2
  logger: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  freezed: ^3.0.6
  json_serializable: ^6.9.5
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/TealTransit.png
  adaptive_icon_background: "#008080"
  adaptive_icon_foreground: assets/TealTransit.png

flutter:
  uses-material-design: true

  assets:
    - assets/

name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bus_ticketing_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bus_ticketing_test
      JWT_ACCESS_SECRET: ci-test-jwt-access-secret-min-32-chars
      JWT_REFRESH_SECRET: ci-test-jwt-refresh-secret-min-32-chars
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: |
            package-lock.json
            dashboard/package-lock.json
      - name: Install API dependencies
        run: npm ci
        working-directory: .
      - name: Install dashboard dependencies
        run: npm ci
      - name: Prepare database
        run: |
          npx prisma migrate deploy
          npx prisma db seed
        working-directory: .
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: dashboard/playwright-report/
          retention-days: 30
